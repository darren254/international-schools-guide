name: Update Exchange Rates

on:
  schedule:
    # Daily at 06:00 UTC (after ECB publishes, covers Asian markets)
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-rates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest exchange rates
        env:
          OXR_APP_ID: ${{ secrets.OXR_APP_ID }}
        run: npx tsx scripts/fetch-exchange-rates.ts

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/lib/currency/rates.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/currency/rates.json
          git commit -m "chore: update exchange rates $(date -u +%Y-%m-%d)"
          git push
